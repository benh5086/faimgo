<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faimgo Assessment — v2 Prototype</title>
<style>
  :root{
    --bg:#f7f6f3; --card:#ffffff; --ink:#1a1d21; --muted:#6b7280;
    --accent:#0f6b5c; --accent-soft:#e3f0ed; --line:#e5e3dd;
    --green:#0f7b4d; --green-soft:#e5f4ec;
    --yellow:#9a6b00; --yellow-soft:#fdf3d8;
    --red:#a13333; --red-soft:#fbe9e7;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px}
  .wrap{width:100%;max-width:640px}
  .brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .logo{font-weight:800;font-size:20px;letter-spacing:-.5px;color:var(--accent)}
  .badge{font-size:11px;background:var(--accent-soft);color:var(--accent);padding:4px 10px;border-radius:999px;font-weight:600}
  .progress{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-bottom:8px}
  .progress>div{height:100%;background:var(--accent);width:0;transition:width .35s ease}
  .meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:28px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .section-tag{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  h1{font-size:26px;letter-spacing:-.5px;margin-bottom:10px}
  h2{font-size:21px;letter-spacing:-.3px;margin-bottom:6px;line-height:1.3}
  .sub{color:var(--muted);font-size:14.5px;line-height:1.55;margin-bottom:20px}
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:18px}
  .opt{display:block;width:100%;text-align:left;padding:14px 16px;border:1.5px solid var(--line);border-radius:10px;background:#fff;font-size:15px;cursor:pointer;transition:all .12s;line-height:1.4}
  .opt:hover{border-color:var(--accent);background:var(--accent-soft)}
  .opt.sel{border-color:var(--accent);background:var(--accent-soft);font-weight:600}
  .opt small{display:block;color:var(--muted);font-weight:400;font-size:13px;margin-top:2px}
  .btnrow{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
  .btn{background:var(--accent);color:#fff;border:none;padding:12px 26px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--muted);font-weight:500;padding:12px 10px}
  .counter{display:inline-block;background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:13px;padding:6px 14px;border-radius:999px;margin-bottom:14px}
  .insight h2{margin-bottom:12px}
  .insight p{font-size:15.5px;line-height:1.6;color:#333}
  .profile-chip{display:inline-block;font-size:13px;font-weight:700;padding:5px 14px;border-radius:999px;margin-bottom:12px}
  input[type=email], input[type=text]{width:100%;padding:13px 15px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;margin-top:10px}
  input:focus{outline:none;border-color:var(--accent)}
  .micro{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.5}
  .skip{display:block;text-align:center;margin-top:14px;font-size:13px;color:var(--muted);text-decoration:underline;cursor:pointer;background:none;border:none;width:100%}
  /* results */
  .verdict{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:999px;display:inline-block;margin-bottom:10px}
  .v-green{background:var(--green-soft);color:var(--green)} .v-yellow{background:var(--yellow-soft);color:var(--yellow)} .v-red{background:var(--red-soft);color:var(--red)}
  .rescard{border:1px solid var(--line);border-radius:var(--radius);padding:24px;background:#fff;margin-bottom:16px}
  .rescard h3{font-size:19px;margin-bottom:4px}
  .rescard .path-label{font-size:13px;color:var(--muted);margin-bottom:14px}
  .rescard p{font-size:14.5px;line-height:1.6;color:#333;margin-bottom:12px}
  .moves{margin:10px 0 4px 0;padding-left:0;list-style:none}
  .moves li{font-size:14.5px;line-height:1.5;padding:9px 0 9px 34px;position:relative;border-top:1px dashed var(--line)}
  .moves li::before{content:attr(data-n);position:absolute;left:2px;top:9px;width:22px;height:22px;background:var(--accent-soft);color:var(--accent);font-weight:700;font-size:12px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .firstdollar{font-size:13px;font-weight:700;color:var(--accent);background:var(--accent-soft);display:inline-block;padding:5px 12px;border-radius:8px;margin-top:6px}
  .bridge{background:var(--accent);color:#fff;border-radius:var(--radius);padding:18px 22px;font-size:15px;line-height:1.55;margin-bottom:16px;font-weight:500}
  .kit{background:#faf9f5;border:1px dashed #d8d4c8;border-radius:10px;padding:16px;margin-top:12px}
  .kit h4{font-size:13.5px;margin-bottom:8px;color:#7a6a2f}
  .kit ul{padding-left:18px}
  .kit li{font-size:13.5px;line-height:1.55;color:#555;margin-bottom:4px}
  .cta{background:var(--card);border:2px solid var(--accent);border-radius:var(--radius);padding:22px;text-align:center;margin-top:8px}
  .cta p{font-size:14.5px;color:#333;margin:8px 0 14px}
  .restart{margin-top:22px;text-align:center}
  .footer-note{font-size:11.5px;color:#a8a29a;text-align:center;margin-top:26px;line-height:1.5}
  .honest{background:var(--red-soft);border-left:4px solid var(--red);padding:12px 16px;border-radius:0 8px 8px 0;font-size:14px;line-height:1.55;margin:12px 0}
  .honest.mild{background:var(--yellow-soft);border-left-color:var(--yellow)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo">faimgo</div>
    <div class="badge">Assessment v2 · prototype</div>
  </div>
  <div class="progress"><div id="bar"></div></div>
  <div class="meta"><span id="stepLabel">Getting started</span><span id="pathsLeft"></span></div>
  <div id="stage"></div>
  <div class="footer-note">Prototype for internal review — scoring runs fully client-side. No data leaves this page.</div>
</div>

<script>
/* ---------- PATH LIBRARY ---------- */
const PATHS = [
 {id:'freelance', name:'Freelancing your skill', plain:'Freelance my skill (writing, design, tech, admin)', dollar:'1–3 weeks', speed:4, ceiling:4, moves:['List the one skill people already ask you for help with','Create one profile (Upwork or direct outreach) with a specific offer, not a generic title','Pitch 10 real prospects with a personalized first line — volume beats polish'], kit:['Free portfolio: Notion or Google Docs — no website needed for client #1','Use free tiers (Canva, ChatGPT/Claude) before paying for any tool']},
 {id:'resell', name:'Reselling & flipping', plain:'Resell / flip items (thrift, clearance, marketplaces)', dollar:'days', speed:5, ceiling:3, moves:['Pick one category you can judge value in — start with what you know','Source 5 items this weekend: thrift stores, clearance aisles, garage sales','List same day on FB Marketplace + eBay; price to sell, not to hope'], kit:['Start with $50 and one shelf — no storage unit until profits pay for it','Free listing photos: natural light + a plain wall beats any equipment']},
 {id:'local', name:'Local services', plain:'Local services (cleaning, lawn care, pressure washing, moving help)', dollar:'days', speed:5, ceiling:3, moves:['Pick one service, one neighborhood — be the person for that thing','Post in local FB groups + Nextdoor with a simple before/after and a price','Do the first 3 jobs cheap in exchange for reviews and photos'], kit:['Rent equipment for the first jobs (Home Depot rents by the day) — buy after job #5 pays for it','Used tools on FB Marketplace go for 30-50% of retail']},
 {id:'gig', name:'Gig apps', plain:'Gig apps (delivery, rideshare, task apps)', dollar:'this week', speed:5, ceiling:2, moves:['Sign up for two apps today — approval takes days, so start the clock now','Work the peak windows only (meal times, weekends) — the hourly rate doubles','Track your real earnings minus gas for 2 weeks before scaling up'], kit:[]},
 {id:'tutor', name:'Tutoring & coaching', plain:'Tutoring or coaching (academics, language, fitness, a skill)', dollar:'1–2 weeks', speed:4, ceiling:4, moves:['Define exactly who you teach and what outcome they get','Post one clear offer on Wyzant/Preply or in local parent/community groups','Offer the first session discounted in exchange for a testimonial'], kit:['Free scheduling: Calendly free tier. Free whiteboard: Google Jamboard alternatives','No certification needed to start most subjects — results are the credential']},
 {id:'va', name:'Virtual assistant / online services', plain:'Virtual assistant or online services', dollar:'2–4 weeks', speed:3, ceiling:3, moves:['List 5 concrete tasks you\'d handle (inbox, scheduling, data, listings)','Message 15 small business owners who are visibly drowning — offer 5 trial hours','Turn the first happy client into a weekly retainer'], kit:['Everything you need is free: Gmail, Sheets, Calendly, Trello']},
 {id:'digital', name:'Digital products', plain:'Digital products (templates, printables, mini-courses)', dollar:'1–3 months', speed:2, ceiling:4, moves:['Find one specific problem people already search for (check Etsy/Gumroad bestsellers)','Build one small product in a weekend — a template, not a masterpiece','List it, then spend 80% of your time on distribution, not more products'], kit:['Free build stack: Canva free + Gumroad (no upfront fees, they take a cut)']},
 {id:'content', name:'Content creation', plain:'Content creation (YouTube, TikTok, newsletter)', dollar:'2–6 months', speed:1, ceiling:5, moves:['Pick one platform and one narrow topic you can talk about for a year','Publish on a fixed schedule for 8 weeks before judging anything','Study your 2 best performers and make more of exactly that'], kit:['Your phone camera is enough for the first 100 videos — creators upgrade after traction, not before']},
 {id:'care', name:'Care services', plain:'Care services (pet sitting, babysitting, senior help)', dollar:'1–2 weeks', speed:4, ceiling:3, moves:['Create profiles on Rover/Care.com and tell your own network you\'re available','Get 3 references lined up — trust is the entire product','Nail the first bookings, ask every happy client for a review and a referral'], kit:['Certifications (CPR, first aid) cost ~$30-50 online and double your credibility — worth it after first jobs, not before']},
];
const pathById = id => PATHS.find(p=>p.id===id);

/* ---------- STATE ---------- */
let A = {};       // answers
let scores = {};  // path scores
let excluded = new Set();
let step = 0;

/* ---------- QUESTION DEFINITIONS ---------- */
const Q = [];
Q.push({key:'intro', type:'intro'});
Q.push({key:'q1', section:'Section 1 · Your Direction', title:'Do you already have something in mind?', opts:[
  {t:'Yes — a specific thing I want to do', v:'yes'},
  {t:'Sort of — a general area', v:'sortof', s:'working with people, making things, online business…'},
  {t:'No — that’s why I’m here. Match me.', v:'no'}]});
Q.push({key:'q1b', cond:()=>A.q1==='yes'||A.q1==='sortof', section:'Section 1 · Your Direction', title:'Which of these is closest to it?', opts:[
  ...PATHS.map(p=>({t:p.plain, v:p.id})), {t:'Something else', v:'other', s:'tell us in a few words'}], other:true});
Q.push({key:'q2', cond:()=>A.q1==='yes'||A.q1==='sortof', section:'Section 1 · Your Direction', title:'What’s pulling you toward it?', opts:[
  {t:'I’ve done it before, or something close to it', v:'done'},
  {t:'It’s something I love or already do for fun', v:'love'},
  {t:'It looks like good money', v:'money'},
  {t:'I’ve seen others succeed at it and want in', v:'seen'}]});
Q.push({key:'q3', cond:()=>A.q1==='yes'||A.q1==='sortof', section:'Section 1 · Your Direction', title:'How much do you actually know about it?', opts:[
  {t:'I’ve done it professionally or seriously', v:'pro'},
  {t:'Hobby level — informal but real', v:'hobby'},
  {t:'I’ve researched it but never done it', v:'research'},
  {t:'Almost nothing yet, just interested', v:'none'}]});
Q.push({key:'q4', section:'Section 1 · Your Direction', title:'How many hours a week can you realistically give this — working on it, learning it, all of it?', opts:[
  {t:'Less than 5 — squeezing it in', v:'lt5'},
  {t:'5–10 — a few evenings', v:'5to10'},
  {t:'10–20 — serious side commitment', v:'10to20'},
  {t:'20+ — this is a priority', v:'20plus'}]});
Q.push({key:'break1', type:'insight1'});
Q.push({key:'q5', section:'Section 2 · Your Resources & Reality', title:'How much could you put in to start — without stressing about it?', opts:[
  {t:'$0 — needs to be free to start', v:'0'},
  {t:'Under $100', v:'100'},
  {t:'$100–$500', v:'500'},
  {t:'$500+ — I can invest in this', v:'500plus'}]});
Q.push({key:'q6', section:'Section 2 · Your Resources & Reality', title:'What do you already have that could help you start?', multi:true, opts:[
  {t:'A reliable car', v:'car'},
  {t:'A computer + solid internet', v:'computer'},
  {t:'Tools or equipment (lawn, cleaning, craft, camera…)', v:'tools'},
  {t:'Spare space (garage, storage, a spare room)', v:'space'},
  {t:'None of these right now', v:'none'}]});
Q.push({key:'q7', section:'Section 2 · Your Resources & Reality', title:'How soon do you want to see your first dollar from this?', opts:[
  {t:'This week if possible', v:'week'},
  {t:'Within a month', v:'month'},
  {t:'1–3 months is fine', v:'quarter'},
  {t:'No rush — I’m building something bigger', v:'norush'}]});
Q.push({key:'q8', section:'Section 2 · Your Resources & Reality', title:'Which sounds more like you?', opts:[
  {t:'Give me guaranteed small money over a risky big win', v:'safe'},
  {t:'Mostly sure things, with a little upside', v:'mostlysafe'},
  {t:'Balanced — some safe, some bets', v:'balanced'},
  {t:'I’ll bet my time on a bigger payoff', v:'bet'}]});
Q.push({key:'break2', type:'insight2'});
Q.push({key:'q9', section:'Section 3 · How You Work', title:'What gives you energy?', opts:[
  {t:'Being around people, face to face', v:'people'},
  {t:'People in small doses — online is ideal', v:'online'},
  {t:'Mostly working alone', v:'alone'},
  {t:'Strictly solo, headphones on', v:'solo'}]});
Q.push({key:'q10', section:'Section 3 · How You Work', title:'How do you feel about putting yourself out there online?', opts:[
  {t:'Love it — camera doesn’t scare me', v:'camera'},
  {t:'Happy to post, prefer not on camera', v:'post'},
  {t:'Behind the scenes only', v:'behind'},
  {t:'I’d rather work offline entirely', v:'offline'}]});
Q.push({key:'q11', section:'Section 3 · How You Work', title:'Which feels most like you?', opts:[
  {t:'Making and creating things', v:'make'},
  {t:'Selling, negotiating, closing', v:'sell'},
  {t:'Helping and taking care of people', v:'help'},
  {t:'Building systems and keeping things running', v:'systems'}]});
Q.push({key:'q12', section:'Section 3 · How You Work', title:'What’s gotten in the way before?', opts:[
  {t:'Never knew where to start', v:'start'},
  {t:'Started things but lost steam', v:'steam'},
  {t:'Time — life keeps eating it', v:'time'},
  {t:'Scared of wasting money', v:'scared'},
  {t:'This is my first real attempt', v:'first'}]});
Q.push({key:'gate', type:'gate'});
Q.push({key:'results', type:'results'});

/* ---------- SCORING ---------- */
function computeScores(){
  scores = {}; excluded = new Set();
  PATHS.forEach(p=>scores[p.id]=0);
  const add=(id,n)=>{ if(scores[id]!==undefined) scores[id]+=n; };
  const assets = A.q6||[];
  // hard filters + asset weights
  if(!assets.includes('car')){ excluded.add('gig'); } else { add('gig',2); add('local',2); }
  if(!assets.includes('computer')){ ['freelance','va','digital','content'].forEach(i=>add(i,-2)); } else { ['freelance','va','digital','content'].forEach(i=>add(i,1)); }
  if(assets.includes('tools')) add('local',2);
  if(!assets.includes('space')) add('resell',-1); else add('resell',2);
  // hours
  ({lt5:['gig','resell','care'],'5to10':['resell','care','local','tutor'],'10to20':['freelance','local','tutor','va'],'20plus':['freelance','digital','content']}[A.q4]||[]).forEach(i=>add(i,2));
  // budget
  if(A.q5==='0'){ add('resell',-1); ['va','tutor','care','freelance'].forEach(i=>add(i,1)); }
  if(A.q5==='500plus'){ ['digital','content','freelance','local'].forEach(i=>add(i,1)); }
  // timeline
  if(A.q7==='week'){ PATHS.filter(p=>p.speed===5).forEach(p=>add(p.id,2)); }
  if(A.q7==='norush'){ PATHS.filter(p=>p.ceiling>=4).forEach(p=>add(p.id,1)); }
  // risk
  if(A.q8==='safe'||A.q8==='mostlysafe'){ PATHS.filter(p=>p.speed>=4).forEach(p=>add(p.id,1)); }
  if(A.q8==='bet'){ PATHS.filter(p=>p.ceiling>=4).forEach(p=>add(p.id,2)); }
  // energy
  ({people:['local','care','tutor'],online:['va','tutor','freelance'],alone:['freelance','digital','resell'],solo:['digital','freelance','content']}[A.q9]||[]).forEach(i=>add(i,2));
  // online comfort
  if(A.q10==='camera') add('content',3);
  if(A.q10==='offline'){ excluded.add('content'); ['freelance','va','digital'].forEach(i=>add(i,-1)); ['local','care','resell'].forEach(i=>add(i,1)); }
  if(A.q10==='behind'){ add('content',-2); }
  // work style
  ({make:['digital','freelance','content'],sell:['resell','freelance','local'],help:['care','tutor','local'],systems:['va','freelance']}[A.q11]||[]).forEach(i=>add(i,2));
  // desire boost
  if(A.q1b && A.q1b!=='other'){
    add(A.q1b,4);
    add(A.q1b, {done:3,love:2,seen:1,money:0}[A.q2]||0);
  }
}
function pathsInPlay(){
  computeScores();
  return PATHS.filter(p=>!excluded.has(p.id) && scores[p.id]>-2).length;
}
function realityFlag(){
  if(!A.q1b || A.q1b==='other') return null;
  const p = pathById(A.q1b);
  const noExp = A.q3==='research'||A.q3==='none';
  const fast = A.q7==='week';
  const slow = p.speed<=2;
  if(slow && noExp && fast) return 'red';
  if((slow&&noExp)||(slow&&fast)||(noExp&&fast&&A.q2==='money')) return 'yellow';
  return 'green';
}
function fastestWin(exceptId){
  computeScores();
  const cands = PATHS.filter(p=>p.speed>=4 && !excluded.has(p.id) && p.id!==exceptId);
  cands.sort((a,b)=>scores[b.id]-scores[a.id]);
  return cands[0];
}
function longTerm(exceptId){
  computeScores();
  const cands = PATHS.filter(p=>!excluded.has(p.id) && p.id!==exceptId);
  cands.sort((a,b)=>(scores[b.id]*b.ceiling)-(scores[a.id]*a.ceiling));
  return cands[0];
}

/* ---------- WHY-IT-FITS text ---------- */
function whyFits(p){
  const bits=[];
  const assets=A.q6||[];
  if(A.q1b===p.id) bits.push('you told us this is where you want to go');
  if(p.id==='local'&&assets.includes('tools')) bits.push('you already own tools most people would have to buy');
  if((p.id==='gig'||p.id==='local')&&assets.includes('car')) bits.push('you have the car it runs on');
  if(['freelance','va','digital','content'].includes(p.id)&&assets.includes('computer')) bits.push('your computer is the only equipment it needs');
  if(A.q9==='people'&&['local','care','tutor'].includes(p.id)) bits.push('it puts you face to face with people, which is where you get energy');
  if((A.q9==='alone'||A.q9==='solo')&&['freelance','digital','resell'].includes(p.id)) bits.push('you can run it mostly solo');
  if(A.q11==='help'&&['care','tutor'].includes(p.id)) bits.push('it’s built on taking care of people — your natural mode');
  if(A.q11==='make'&&['digital','content','freelance'].includes(p.id)) bits.push('it rewards making things');
  if(A.q11==='sell'&&['resell','local'].includes(p.id)) bits.push('it rewards your seller instincts');
  if(A.q7==='week'&&p.speed>=5) bits.push('it can genuinely pay within days');
  if(bits.length===0) bits.push('it scored highest across your time, resources, and working style');
  return 'This fits because ' + bits.slice(0,3).join(', ') + '.';
}
function needsKit(p){
  const assets=A.q6||[];
  if(p.id==='local'&&!assets.includes('tools')) return true;
  if(p.id==='resell'&&(A.q5==='0'||!assets.includes('space'))) return true;
  if(['freelance','digital','content','va'].includes(p.id)&&!assets.includes('computer')) return true;
  if(p.id==='tutor'&&A.q5==='0') return true;
  if(p.id==='care'&&A.q5==='0') return true;
  return false;
}

/* ---------- RENDER ---------- */
const stage = document.getElementById('stage');
function visibleSteps(){ return Q.filter(q=>!q.cond||q.cond()); }
function render(){
  const steps = visibleSteps();
  if(step>=steps.length) step=steps.length-1;
  const q = steps[step];
  const answerable = steps.filter(s=>!s.type).length;
  const answeredIdx = steps.slice(0,step).filter(s=>!s.type).length;
  document.getElementById('bar').style.width = (q.type==='results'?100:Math.round(answeredIdx/answerable*100))+'%';
  document.getElementById('stepLabel').textContent = q.section || ({intro:'Welcome',insight1:'Insight',insight2:'Insight',gate:'Almost there',results:'Your plan'})[q.type]||'';
  document.getElementById('pathsLeft').textContent = (q.type==='insight1'||q.type==='insight2') ? '' : (step>1&&q.type!=='results'? pathsInPlay()+' of 9 paths in play':'');

  if(q.type==='intro'){ stage.innerHTML = `
    <div class="card">
      <div class="section-tag">Faimgo Assessment</div>
      <h1>Find your two paths.</h1>
      <p class="sub">Answer honestly — about 3 minutes. You’ll get your <b>fastest first win</b> and, if you already have a dream in mind, an <b>honest reality check</b> on it. No fluff, no "just believe in yourself."</p>
      <div class="btnrow"><span></span><button class="btn" onclick="next()">Start</button></div>
    </div>`; return; }

  if(q.type==='insight1'){
    let chip,head,body;
    if(A.q1==='yes'||A.q1==='sortof'){
      const label = A.q1b==='other'?(A.q1bOther||'your idea'):pathById(A.q1b).name.toLowerCase();
      if(A.q2==='done'||A.q3==='pro'){chip=['Pro start','var(--green-soft)','var(--green)'];head='You’re not starting from zero.';body=`You’ve got real experience behind ${label}. The plan skips the beginner steps and goes straight to getting paid.`;}
      else if(A.q2==='love'||A.q3==='hobby'){chip=['Warm start','var(--accent-soft)','var(--accent)'];head='You’ve got a real foundation.';body=`You know ${label} well enough to move fast — the gap is turning it from something you do into something you charge for.`;}
      else {chip=['Cold start','var(--yellow-soft)','var(--yellow)'];head='You’re starting from zero on this one.';body=`That’s allowed — everyone starts somewhere. But the plan has to respect it: ${label} will take real ramp-up time, and we’ll pair it with something that pays sooner.`;}
    } else {
      if(A.q4==='lt5'||A.q4==='5to10'){chip=['Sprinter profile','var(--accent-soft)','var(--accent)'];head='We’re optimizing for speed.';body='With your hours, the plan prioritizes paths that pay in days, not months.';}
      else if(A.q4==='20plus'){chip=['Builder profile','var(--accent-soft)','var(--accent)'];head='You can afford to build.';body='20+ hours a week means paths with a real ceiling are on the table, not just quick cash.';}
      else {chip=['Hybrid profile','var(--accent-soft)','var(--accent)'];head='A quick win and a long game.';body='Your time supports both — which is exactly the two-path plan this assessment builds.';}
    }
    stage.innerHTML = `<div class="card insight">
      <span class="profile-chip" style="background:${chip[1]};color:${chip[2]}">${chip[0]}</span>
      <h2>${head}</h2><p>${body}</p>
      <p style="margin-top:10px;color:var(--muted);font-size:13.5px">${pathsInPlay()} of 9 paths still in play.</p>
      <div class="btnrow"><button class="btn ghost" onclick="back()">Back</button><button class="btn" onclick="next()">Continue</button></div>
    </div>`; return;
  }

  if(q.type==='insight2'){
    const assets=A.q6||[]; const bits=[];
    if(assets.includes('car'))bits.push('a car');
    if(assets.includes('tools'))bits.push('tools');
    if(assets.includes('computer'))bits.push('a computer');
    if(assets.includes('space'))bits.push('spare space');
    const money={'0':'$0','100':'under $100','500':'up to $500','500plus':'$500+'}[A.q5];
    let body = bits.length? `You’re working with ${bits.join(', ')} and ${money} to start. That’s a real launch kit — several paths could take their first paying job within days.` : `Starting lean — no gear, ${money} in. Good news: three of the nine paths need nothing but time and follow-through, and your plan will include the cheapest possible way to get anything else.`;
    let flag='';
    const rf = realityFlag();
    if(rf==='red') flag = `<div class="honest"><b>A heads-up before your results:</b> the path you named is one of the slowest to first dollar, you’re new to it, and you want money this week. Those three don’t fit together — your results will show the honest ramp, plus what actually can pay you this week.</div>`;
    else if(rf==='yellow') flag = `<div class="honest mild"><b>One honest note:</b> the path you named has a longer ramp than your timeline wants. Your results will show the real numbers — and a faster path to run alongside it.</div>`;
    stage.innerHTML = `<div class="card insight">
      <span class="profile-chip" style="background:var(--accent-soft);color:var(--accent)">Your launch window</span>
      <h2>Here’s what you’re working with.</h2><p>${body}</p>${flag}
      <p style="margin-top:10px;color:var(--muted);font-size:13.5px">Down to ${pathsInPlay()} paths.</p>
      <div class="btnrow"><button class="btn ghost" onclick="back()">Back</button><button class="btn" onclick="next()">Continue</button></div>
    </div>`; return;
  }

  if(q.type==='gate'){ stage.innerHTML = `
    <div class="card">
      <div class="section-tag">One last thing</div>
      <h2>Your two paths are ready.</h2>
      <p class="sub">Where should we send your plan so you don’t lose it?</p>
      <input type="email" id="email" placeholder="you@email.com">
      <p class="micro">No spam — you can unsubscribe anytime. Your answers stay private.</p>
      <div class="btnrow"><button class="btn ghost" onclick="back()">Back</button><button class="btn" onclick="next()">Show me my plan</button></div>
      <button class="skip" onclick="next()">Preview mode: skip the email →</button>
    </div>`; return; }

  if(q.type==='results'){ renderResults(); return; }

  /* standard question */
  const sel = q.multi ? (A[q.key]||[]) : A[q.key];
  stage.innerHTML = `<div class="card">
    <div class="section-tag">${q.section}</div>
    <h2>${q.title}</h2>
    ${q.multi?'<p class="sub" style="margin-bottom:0">Select all that apply.</p>':''}
    <div class="opts">${q.opts.map(o=>`
      <button class="opt ${q.multi?(sel.includes(o.v)?'sel':''):(sel===o.v?'sel':'')}" onclick="pick('${q.key}','${o.v}',${!!q.multi})">${o.t}${o.s?`<small>${o.s}</small>`:''}</button>`).join('')}
    </div>
    ${q.other&&A[q.key]==='other'?`<input type="text" id="otherTxt" placeholder="What is it? (a few words)" value="${A.q1bOther||''}" oninput="A.q1bOther=this.value">`:''}
    <div class="btnrow">
      <button class="btn ghost" onclick="back()">${step>1?'Back':''}</button>
      <button class="btn" id="cont" onclick="next()" ${(q.multi?(sel.length===0):(sel===undefined))?'disabled':''}>Continue</button>
    </div>
  </div>`;
}

function renderResults(){
  computeScores();
  const named = (A.q1==='yes'||A.q1==='sortof');
  let html = '';
  if(named && A.q1b && A.q1b!=='other'){
    const p = pathById(A.q1b);
    const rf = realityFlag();
    const vmap = {green:['v-green','You can start this now'],yellow:['v-yellow','You can get there — here’s the real ramp'],red:['v-red','Here’s the truth about this path for you today']};
    let honest='';
    if(rf==='red') honest = `<div class="honest">You want your first dollar <b>this week</b>, from a path that typically takes <b>${p.dollar}</b>, starting with little experience. Possible? Technically. Realistic? No. The honest timeline for you on ${p.name.toLowerCase()} is measured in months, not days. If you still want it after reading that — and some people should — here’s step one below, and a second path that pays while you build.</div>`;
    else if(rf==='yellow') honest = `<div class="honest mild">The real ramp for ${p.name.toLowerCase()} at your experience level: <b>${p.dollar} at best, usually longer</b>. It’s a good path — it just won’t match the timeline you picked. The second card below is what covers the gap.</div>`;
    html += `<div class="rescard">
      <span class="verdict ${vmap[rf][0]}">${vmap[rf][1]}</span>
      <h3>🎯 Your Chosen Path: ${p.name}</h3>
      <div class="path-label">First dollar: typically ${p.dollar} · Ceiling ${'★'.repeat(p.ceiling)}</div>
      ${honest}
      <p>${whyFits(p)} ${A.q2==='money'?'One honest note: "it looks like good money" is a reason to test it — not yet a reason to bet on it. The first 3 moves below are the cheapest possible test.':''}</p>
      <ul class="moves">${p.moves.map((m,i)=>`<li data-n="${i+1}">${m}</li>`).join('')}</ul>
      ${needsKit(p)&&p.kit.length?`<div class="kit"><h4>🧰 Start Cheap Kit — you’re missing some gear, here’s how to not overspend</h4><ul>${p.kit.map(k=>`<li>${k}</li>`).join('')}</ul></div>`:''}
    </div>`;
    const fw = fastestWin(p.id);
    if(fw && rf!=='green'){
      html += `<div class="rescard">
        <span class="verdict v-green">Pays while you build</span>
        <h3>⚡ Your Fastest First Win: ${fw.name}</h3>
        <div class="path-label">First dollar: typically ${fw.dollar}</div>
        <p>${whyFits(fw)}</p>
        <ul class="moves">${fw.moves.map((m,i)=>`<li data-n="${i+1}">${m}</li>`).join('')}</ul>
      </div>
      <div class="bridge">How they work together: ${fw.name} money funds your first months of ${p.name.toLowerCase()} — you’re earning by day 30 while the real goal ramps toward day 90.</div>`;
    } else if(fw && rf==='green'){
      html += `<div class="bridge">You don’t need a bridge income — your chosen path IS a fast path for you. If you want a backup anyway: ${fw.name.toLowerCase()} scored next highest.</div>`;
    }
  } else if(named && A.q1b==='other'){
    const idea = A.q1bOther||'your idea';
    const fw = fastestWin(); const lt = longTerm(fw?fw.id:null);
    html += `<div class="rescard">
      <span class="verdict v-yellow">Outside the current library</span>
      <h3>🎯 Your idea: "${idea}"</h3>
      <p>Honest answer: "${idea}" isn’t one of the nine paths we score yet — so instead of pretending, here’s the universal validation play: (1) find 3 people already doing it and study how they actually get paid, (2) define the smallest version you could sell in 30 days, (3) pitch it to 5 real people before building anything. Meanwhile, the two cards below are your highest-scoring proven paths.</p>
    </div>`;
    if(fw) html += fwCard(fw);
    if(lt) html += ltCard(lt);
  } else {
    const fw = fastestWin(); const lt = longTerm(fw?fw.id:null);
    if(fw) html += fwCard(fw);
    if(lt) html += ltCard(lt);
    if(fw&&lt) html += `<div class="bridge">How they work together: ${fw.name} pays your first 60 days while ${lt.name.toLowerCase()} compounds toward the real ceiling.</div>`;
  }
  const tone = {steam:'Your plan is built as a day-by-day walkthrough — the thing that kills momentum is deciding what’s next, so we decide it for you.',scared:'Every step starts with the $0 version. You don’t spend until something has already worked.',start:'Step one is deliberately tiny. You’ll know exactly where to start because it’s the only thing on the list.',time:'The plan fits your real hours — short, fixed sessions, nothing that needs a free weekend.',first:'First real attempt — good. No bad habits to unlearn. The plan assumes nothing and explains everything.'}[A.q12]||'';
  html += `<div class="cta"><h3>This is the map. The walkthrough is the product.</h3><p>${tone} Faimgo walks you from these first moves to your first dollar — step by step, honestly.</p><button class="btn">Start my 30/60/90 →</button><p class="micro">(CTA placeholder — subscription flow comes later)</p></div>
  <div class="restart"><button class="btn ghost" onclick="restart()">↺ Restart prototype</button></div>`;
  stage.innerHTML = html;
}
function fwCard(fw){ return `<div class="rescard"><span class="verdict v-green">Fastest first win</span><h3>⚡ ${fw.name}</h3><div class="path-label">First dollar: typically ${fw.dollar}</div><p>${whyFits(fw)}</p><ul class="moves">${fw.moves.map((m,i)=>`<li data-n="${i+1}">${m}</li>`).join('')}</ul>${needsKit(fw)&&fw.kit.length?`<div class="kit"><h4>🧰 Start Cheap Kit</h4><ul>${fw.kit.map(k=>`<li>${k}</li>`).join('')}</ul></div>`:''}</div>`; }
function ltCard(lt){ return `<div class="rescard"><span class="verdict v-yellow">Long-term path</span><h3>🏔 ${lt.name}</h3><div class="path-label">First dollar: typically ${lt.dollar} · Ceiling ${'★'.repeat(lt.ceiling)}</div><p>${whyFits(lt)}</p><ul class="moves">${lt.moves.map((m,i)=>`<li data-n="${i+1}">${m}</li>`).join('')}</ul></div>`; }

/* ---------- NAV ---------- */
function pick(key,v,multi){
  if(multi){
    A[key]=A[key]||[];
    if(v==='none'){ A[key]=A[key].includes('none')?[]:['none']; }
    else{
      A[key]=A[key].filter(x=>x!=='none');
      A[key].includes(v)?A[key]=A[key].filter(x=>x!==v):A[key].push(v);
    }
  } else {
    A[key]=v;
    if(key==='q1'&&v==='no'){ delete A.q1b; delete A.q2; delete A.q3; delete A.q1bOther; }
  }
  render();
}
function next(){ step++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function back(){ if(step>0){ step--; render(); } }
function restart(){ A={}; step=0; render(); }
render();
</script>
</body>
</html>
